name: Linux/Windows standalone binary issue
description: Report a problem with a Linux or Windows standalone release asset
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. This template is for Linux/Windows standalone binary issues.

        Before submitting, please run these if possible:

        - `agent-notify --version`
        - `agent-notify status`
        - `agent-notify doctor`
        - `agent-notify test done --force`

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      description: "Examples: Ubuntu 24.04, Fedora 41, Windows 11 24H2"
      placeholder: Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: arch
    attributes:
      label: CPU architecture
      description: "Example: x64, arm64"
      placeholder: x64
    validations:
      required: true

  - type: input
    id: asset
    attributes:
      label: Release asset / install method
      description: "Example: agent-notify-linux-x64.tar.gz, agent-notify-windows-x64.zip, source build"
      placeholder: agent-notify-linux-x64.tar.gz
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Exact command(s) run
      placeholder: |
        agent-notify --version
        agent-notify status
        agent-notify test done --force
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: What happened?
      description: Include any error messages, screenshots, or visible behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: "`agent-notify doctor` output"
      render: shell
      placeholder: Paste full output here

  - type: textarea
    id: status
    attributes:
      label: "`agent-notify status` output"
      render: shell
      placeholder: Paste full output here

  - type: textarea
    id: version
    attributes:
      label: "`agent-notify --version` output"
      render: shell
      placeholder: Paste full output here

  - type: textarea
    id: backend-prereqs
    attributes:
      label: Backend prerequisites
      description: |
        Tell us whether the platform-specific backend is installed.
        - Linux: is `notify-send` available on PATH?
        - Windows: is PowerShell available? Is BurntToast installed?
      placeholder: |
        Linux: `notify-send` is installed via libnotify-bin
        Windows: PowerShell 7 present, BurntToast not installed

  - type: dropdown
    id: test-force
    attributes:
      label: "Did `agent-notify test done --force` show anything?"
      options:
        - Yes
        - No
        - Not sure
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Additional context that may help reproduce or diagnose the issue.
