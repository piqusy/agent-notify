name: Release
run-name: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.outfile }})
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - platform: darwin
            arch: arm64
            outfile: agent-notify-darwin-arm64
            bun_target: bun-darwin-arm64
            binary_name: agent-notify
            sign_binary: true
            stage_helper: true
          - platform: darwin
            arch: x64
            outfile: agent-notify-darwin-x64
            bun_target: bun-darwin-x64
            binary_name: agent-notify
            sign_binary: true
            stage_helper: true
          - platform: linux
            arch: arm64
            outfile: agent-notify-linux-arm64
            bun_target: bun-linux-arm64
            binary_name: agent-notify
            sign_binary: false
            stage_helper: false
          - platform: linux
            arch: x64
            outfile: agent-notify-linux-x64
            bun_target: bun-linux-x64
            binary_name: agent-notify
            sign_binary: false
            stage_helper: false
          - platform: windows
            arch: x64
            outfile: agent-notify-windows-x64
            bun_target: bun-windows-x64
            binary_name: agent-notify.exe
            sign_binary: false
            stage_helper: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate release tag
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must match vMAJOR.MINOR.PATCH"
            exit 1
          fi
          git fetch --tags --force origin
          if ! git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "::error::Tag $RELEASE_TAG does not exist on origin"
            exit 1
          fi

      - name: Check out release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
          path: release-src

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        working-directory: release-src
        run: bun install --frozen-lockfile

      - name: Check release files
        run: node scripts/check-release.mjs
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          REPO_ROOT: ${{ github.workspace }}/release-src

      - name: Build JS packages
        working-directory: release-src
        run: bun run build

      - name: Compile standalone binary (${{ matrix.outfile }})
        working-directory: release-src
        run: |
          mkdir -p dist/${{ matrix.outfile }}/bin
          bun build cli/src/index.ts \
            --compile \
            --outfile dist/${{ matrix.outfile }}/bin/${{ matrix.binary_name }} \
            --target ${{ matrix.bun_target }}

      - name: Ad-hoc sign binary (${{ matrix.outfile }})
        if: ${{ matrix.sign_binary }}
        working-directory: release-src
        run: codesign --sign - --force dist/${{ matrix.outfile }}/bin/${{ matrix.binary_name }}

      - name: Stage OpenCode plugin bundle (${{ matrix.arch }})
        working-directory: release-src
        run: |
          mkdir -p dist/${{ matrix.outfile }}/opencode-agent-notify
          cp packages/opencode/package.json dist/${{ matrix.outfile }}/opencode-agent-notify/
          cp -R packages/opencode/dist dist/${{ matrix.outfile }}/opencode-agent-notify/

      - name: Stage Claude Code hook bundle (${{ matrix.arch }})
        working-directory: release-src
        run: |
          mkdir -p dist/${{ matrix.outfile }}/claude-code/hooks
          cp packages/claude-code/README.md dist/${{ matrix.outfile }}/claude-code/
          cp -R packages/claude-code/hooks/. dist/${{ matrix.outfile }}/claude-code/hooks/

      - name: Stage Pi extension bundle (${{ matrix.arch }})
        working-directory: release-src
        run: |
          mkdir -p dist/${{ matrix.outfile }}/pi-coding-agent
          cp packages/pi-coding-agent/README.md dist/${{ matrix.outfile }}/pi-coding-agent/
          cp packages/pi-coding-agent/src/agent-notify.ts dist/${{ matrix.outfile }}/pi-coding-agent/

      - name: Stage macOS helper app (${{ matrix.outfile }})
        if: ${{ matrix.stage_helper }}
        working-directory: release-src
        run: |
          mkdir -p dist/${{ matrix.outfile }}/agent-notify-helper
          cp -R packages/macos-helper/dist/AgentNotify.app dist/${{ matrix.outfile }}/agent-notify-helper/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.outfile }}
          path: release-src/dist/${{ matrix.outfile }}
          if-no-files-found: error

  smoke:
    name: Smoke (${{ matrix.outfile }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            outfile: agent-notify-linux-x64
            binary_name: agent-notify
          - os: windows-latest
            outfile: agent-notify-windows-x64
            binary_name: agent-notify.exe

    steps:
      - name: Download built artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.outfile }}
          path: dist/${{ matrix.outfile }}

      - name: Smoke test Linux binary and backend path
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          mkdir -p ci-bin
          cat > ci-bin/notify-send <<'EOF'
          #!/usr/bin/env bash
          printf '%s\n' "$*" > "$RUNNER_TEMP/notify-send-args.txt"
          exit 0
          EOF
          chmod +x ci-bin/notify-send
          export PATH="$PWD/ci-bin:$PATH"

          binary="dist/${{ matrix.outfile }}/bin/${{ matrix.binary_name }}"
          chmod +x "$binary"
          "$binary" --help > /dev/null
          "$binary" --version
          "$binary" status --tool smoke-test
          "$binary" test done --force

          test -f "$RUNNER_TEMP/notify-send-args.txt"
          grep -F -- "Test — Done" "$RUNNER_TEMP/notify-send-args.txt"

      - name: Smoke test Windows binary and backend path
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $shimDir = Join-Path $PWD "ci-bin"
          New-Item -ItemType Directory -Force -Path $shimDir | Out-Null
          $shimPath = Join-Path $shimDir "powershell.cmd"
          @"
          @echo off
          setlocal
          > "%RUNNER_TEMP%\powershell-args.txt" echo %*
          exit /b 0
          "@ | Set-Content -Path $shimPath -Encoding ASCII
          $env:PATH = "$shimDir;$env:PATH"

          $binary = "dist/${{ matrix.outfile }}/bin/${{ matrix.binary_name }}"
          & $binary --help | Out-Null
          & $binary --version
          & $binary status --tool smoke-test
          & $binary test done --force

          $argsFile = Join-Path $env:RUNNER_TEMP "powershell-args.txt"
          if (!(Test-Path $argsFile)) {
            throw "powershell shim was not invoked"
          }

          $captured = Get-Content $argsFile -Raw
          if ($captured -notmatch '-EncodedCommand\s+([^\s]+)') {
            throw "Encoded PowerShell payload not found in shim invocation"
          }

          $encoded = $Matches[1]
          $decoded = [System.Text.Encoding]::Unicode.GetString([Convert]::FromBase64String($encoded))
          if ($decoded -notmatch 'Test — Done') {
            throw "Decoded PowerShell payload did not contain the expected notification title"
          }

  publish:
    name: Create Release
    needs: [build, smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate release tag
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must match vMAJOR.MINOR.PATCH"
            exit 1
          fi
          git fetch --tags --force origin
          if ! git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "::error::Tag $RELEASE_TAG does not exist on origin"
            exit 1
          fi

      - name: Check out release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
          path: release-src

      - name: Check release files
        run: node scripts/check-release.mjs
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          REPO_ROOT: ${{ github.workspace }}/release-src

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/

      - name: Create release archives
        run: |
          cd dist
          tar -czf agent-notify-darwin-arm64.tar.gz agent-notify-darwin-arm64
          tar -czf agent-notify-darwin-x64.tar.gz agent-notify-darwin-x64
          tar -czf agent-notify-linux-arm64.tar.gz agent-notify-linux-arm64
          tar -czf agent-notify-linux-x64.tar.gz agent-notify-linux-x64
          zip -qr agent-notify-windows-x64.zip agent-notify-windows-x64
          sha256sum \
            agent-notify-darwin-arm64.tar.gz \
            agent-notify-darwin-x64.tar.gz \
            agent-notify-linux-arm64.tar.gz \
            agent-notify-linux-x64.tar.gz \
            agent-notify-windows-x64.zip > checksums.txt
          cat checksums.txt

      - name: Normalize release version
        id: version
        run: echo "no_v=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release-notes.md <<EOF
          ## Install via Homebrew (macOS)

          Homebrew publishing runs in a separate workflow after this GitHub Release is created.

          \`\`\`sh
          brew tap piqusy/tap
          brew install agent-notify
          \`\`\`

          For exact historical versions, use the standalone assets attached to this release.

          ## Standalone binaries

          Download the asset matching your OS/CPU from this release:

          - macOS: `agent-notify-darwin-arm64.tar.gz`, `agent-notify-darwin-x64.tar.gz`
          - Linux: `agent-notify-linux-arm64.tar.gz`, `agent-notify-linux-x64.tar.gz`
          - Windows: `agent-notify-windows-x64.zip`

          Release archives and checksums are attached below.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              dist/agent-notify-darwin-arm64.tar.gz \
              dist/agent-notify-darwin-x64.tar.gz \
              dist/agent-notify-linux-arm64.tar.gz \
              dist/agent-notify-linux-x64.tar.gz \
              dist/agent-notify-windows-x64.zip \
              dist/checksums.txt \
              --clobber
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              dist/agent-notify-darwin-arm64.tar.gz \
              dist/agent-notify-darwin-x64.tar.gz \
              dist/agent-notify-linux-arm64.tar.gz \
              dist/agent-notify-linux-x64.tar.gz \
              dist/agent-notify-windows-x64.zip \
              dist/checksums.txt \
              --title "$RELEASE_TAG" \
              --notes-file /tmp/release-notes.md
          fi

      - name: Dispatch Homebrew Tap workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run homebrew-tap.yml -f tag="$RELEASE_TAG"
