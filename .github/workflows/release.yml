name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: arm64
            outfile: agent-notify-darwin-arm64
            bun_target: bun-darwin-arm64
          - arch: x64
            outfile: agent-notify-darwin-x64
            bun_target: bun-darwin-x64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build JS packages
        run: bun run build

      - name: Compile standalone binary (${{ matrix.arch }})
        run: |
          mkdir -p dist/${{ matrix.outfile }}/bin
          bun build cli/src/index.ts \
            --compile \
            --outfile dist/${{ matrix.outfile }}/bin/agent-notify \
            --target ${{ matrix.bun_target }}

      - name: Ad-hoc sign binary (${{ matrix.arch }})
        run: codesign --sign - --force dist/${{ matrix.outfile }}/bin/agent-notify

      - name: Stage OpenCode plugin bundle (${{ matrix.arch }})
        run: |
          mkdir -p dist/${{ matrix.outfile }}/opencode-agent-notify
          cp packages/opencode/package.json dist/${{ matrix.outfile }}/opencode-agent-notify/
          cp -R packages/opencode/dist dist/${{ matrix.outfile }}/opencode-agent-notify/

      - name: Stage Claude Code hook bundle (${{ matrix.arch }})
        run: |
          mkdir -p dist/${{ matrix.outfile }}/claude-code/hooks
          cp packages/claude-code/README.md dist/${{ matrix.outfile }}/claude-code/
          cp -R packages/claude-code/hooks/. dist/${{ matrix.outfile }}/claude-code/hooks/

      - name: Stage Pi extension bundle (${{ matrix.arch }})
        run: |
          mkdir -p dist/${{ matrix.outfile }}/pi-coding-agent
          cp packages/pi-coding-agent/README.md dist/${{ matrix.outfile }}/pi-coding-agent/
          cp packages/pi-coding-agent/src/agent-notify.ts dist/${{ matrix.outfile }}/pi-coding-agent/

      - name: Stage macOS helper app (${{ matrix.arch }})
        run: |
          mkdir -p dist/${{ matrix.outfile }}/agent-notify-helper
          cp -R packages/macos-helper/dist/AgentNotify.app dist/${{ matrix.outfile }}/agent-notify-helper/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.outfile }}
          path: dist/${{ matrix.outfile }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate changelog entry
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NO_V=${VERSION#v}
          TOP_ENTRY=$(awk '/^## \[/ { print; exit }' CHANGELOG.md)
          case "$TOP_ENTRY" in
            "## [${VERSION_NO_V}] — "*) ;;
            *)
            echo "Changelog top entry does not match release version: $TOP_ENTRY"
            exit 1
            ;;
          esac
          if ! awk 'BEGIN{entry=0; bullets=0} /^## \[/{entry=1; next} entry && /^### /{bullets=1; exit} END{exit bullets ? 0 : 1}' CHANGELOG.md; then
            echo "Changelog entry missing section heading"
            exit 1
          fi

      - name: Validate source versions
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NO_V=${VERSION#v}
          CLI_VERSION=$(node -e 'const fs=require("fs"); const s=fs.readFileSync("cli/src/version.ts","utf8"); const m=s.match(/CLI_VERSION\s*=\s*"([^"]+)"/); if (!m) process.exit(1); process.stdout.write(m[1]);')
          for FILE in cli/package.json packages/core/package.json packages/opencode/package.json packages/claude-code/package.json; do
            PKG_VERSION=$(node -e 'const fs=require("fs"); const file=process.argv[1]; const pkg=JSON.parse(fs.readFileSync(file,"utf8")); process.stdout.write(pkg.version);' "$FILE")
            if [ "$PKG_VERSION" != "$VERSION_NO_V" ]; then
              echo "$FILE version $PKG_VERSION does not match release version $VERSION_NO_V"
              exit 1
            fi
          done
          if [ "$CLI_VERSION" != "$VERSION_NO_V" ]; then
            echo "cli/src/version.ts version $CLI_VERSION does not match release version $VERSION_NO_V"
            exit 1
          fi

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/

      - name: Create tarballs
        run: |
          cd dist
          tar -czf agent-notify-darwin-arm64.tar.gz agent-notify-darwin-arm64
          tar -czf agent-notify-darwin-x64.tar.gz agent-notify-darwin-x64
          sha256sum agent-notify-darwin-arm64.tar.gz agent-notify-darwin-x64.tar.gz > checksums.txt
          cat checksums.txt

      - name: Export tarball SHAs
        id: shas
        run: |
          echo "arm64=$(sha256sum dist/agent-notify-darwin-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x64=$(sha256sum dist/agent-notify-darwin-x64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula with version + SHAs
        env:
          VERSION: ${{ github.ref_name }}
          ARM64_SHA: ${{ steps.shas.outputs.arm64 }}
          X64_SHA: ${{ steps.shas.outputs.x64 }}
        run: |
          sed -i \
            -e "s|HOMEBREW_VERSION_PLACEHOLDER|${VERSION#v}|g" \
            -e "s|HOMEBREW_ARM64_SHA_PLACEHOLDER|${ARM64_SHA}|g" \
            -e "s|HOMEBREW_X64_SHA_PLACEHOLDER|${X64_SHA}|g" \
            Formula/agent-notify.rb
          cat Formula/agent-notify.rb

      - name: Compute versioned formula name
        id: names
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NO_V=${VERSION#v}
          FORMULA_PATH="Formula/agent-notify@${VERSION_NO_V}.rb"
          echo "version_no_v=${VERSION_NO_V}" >> "$GITHUB_OUTPUT"
          echo "formula_path=${FORMULA_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create versioned formula
        env:
          FORMULA_PATH: ${{ steps.names.outputs.formula_path }}
          VERSION_NO_V: ${{ steps.names.outputs.version_no_v }}
        run: |
          VERSION_CLASS=AgentNotifyAT${VERSION_NO_V//./}
          cp Formula/agent-notify.rb "$FORMULA_PATH"
          sed -i \
            -e "s|class AgentNotify < Formula|class ${VERSION_CLASS} < Formula|" \
            -e "s|This formula is auto-updated by the release workflow\.|This formula is a versioned release formula.|" \
            -e "s|Do not manually edit the version, arm64_sha256, or x64_sha256 fields\.|Do not manually edit the version or SHA fields.|" \
            "$FORMULA_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/agent-notify-darwin-arm64.tar.gz
            dist/agent-notify-darwin-x64.tar.gz
            dist/checksums.txt
            Formula/agent-notify.rb
            ${{ steps.names.outputs.formula_path }}
          body: |
            ## Install via Homebrew

            ```sh
            brew tap piqusy/tap
            brew install agent-notify
            ```

            Exact version:
            ```sh
             brew install piqusy/tap/agent-notify@${{ steps.names.outputs.version_no_v }}
            ```

            Upgrade:
            ```sh
            brew upgrade agent-notify
            ```

            ## Manual install

            ```sh
            # Apple Silicon (arm64)
            curl -L https://github.com/piqusy/agent-notify/releases/download/${{ github.ref_name }}/agent-notify-darwin-arm64.tar.gz | tar xz
            chmod +x agent-notify-darwin-arm64 && mv agent-notify-darwin-arm64 /usr/local/bin/agent-notify

            # Intel (x64)
            curl -L https://github.com/piqusy/agent-notify/releases/download/${{ github.ref_name }}/agent-notify-darwin-x64.tar.gz | tar xz
            chmod +x agent-notify-darwin-x64 && mv agent-notify-darwin-x64 /usr/local/bin/agent-notify
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download published release tarballs
        # Download the *actual* release assets so SHA256 matches what Homebrew fetches
        run: |
          gh release download ${{ github.ref_name }} \
            -R piqusy/agent-notify \
            -p "agent-notify-darwin-arm64.tar.gz" \
            -p "agent-notify-darwin-x64.tar.gz" \
            --dir dist/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHAs from release tarballs
        id: shas
        run: |
          echo "arm64=$(sha256sum dist/agent-notify-darwin-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x64=$(sha256sum dist/agent-notify-darwin-x64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Patch formula
        env:
          VERSION: ${{ github.ref_name }}
          ARM64_SHA: ${{ steps.shas.outputs.arm64 }}
          X64_SHA: ${{ steps.shas.outputs.x64 }}
        run: |
          sed -i \
            -e "s|HOMEBREW_VERSION_PLACEHOLDER|${VERSION#v}|g" \
            -e "s|HOMEBREW_ARM64_SHA_PLACEHOLDER|${ARM64_SHA}|g" \
            -e "s|HOMEBREW_X64_SHA_PLACEHOLDER|${X64_SHA}|g" \
            Formula/agent-notify.rb

      - name: Compute versioned formula name
        id: names
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NO_V=${VERSION#v}
          FORMULA_PATH="Formula/agent-notify@${VERSION_NO_V}.rb"
          echo "version_no_v=${VERSION_NO_V}" >> "$GITHUB_OUTPUT"
          echo "formula_path=${FORMULA_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create versioned tap formula
        env:
          FORMULA_PATH: ${{ steps.names.outputs.formula_path }}
          VERSION_NO_V: ${{ steps.names.outputs.version_no_v }}
        run: |
          VERSION_CLASS=AgentNotifyAT${VERSION_NO_V//./}
          cp Formula/agent-notify.rb "$FORMULA_PATH"
          sed -i \
            -e "s|class AgentNotify < Formula|class ${VERSION_CLASS} < Formula|" \
            -e "s|This formula is auto-updated by the release workflow\.|This formula is a versioned release formula.|" \
            -e "s|Do not manually edit the version, arm64_sha256, or x64_sha256 fields\.|Do not manually edit the version or SHA fields.|" \
            "$FORMULA_PATH"

      - name: Configure SSH for tap repo
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host github-tap
            HostName github.com
            User git
            IdentityFile ~/.ssh/tap_deploy_key
          EOF

      - name: Clone tap repo
        run: git clone git@github-tap:piqusy/homebrew-tap.git tap

      - name: Copy patched formula into tap
        run: |
          cp Formula/agent-notify.rb tap/Formula/agent-notify.rb
          cp "${{ steps.names.outputs.formula_path }}" "tap/${{ steps.names.outputs.formula_path }}"

      - name: Commit and push to tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-notify.rb "${{ steps.names.outputs.formula_path }}"
          git commit -m "update: agent-notify ${{ github.ref_name }}"
          git push
