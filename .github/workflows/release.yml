name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - arch: arm64
            outfile: agent-notify-darwin-arm64
            bun_target: bun-darwin-arm64
            runs_on: macos-latest
          - arch: x64
            outfile: agent-notify-darwin-x64
            bun_target: bun-darwin-x64
            runs_on: macos-13

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build JS packages
        run: bun run build

      - name: Compile standalone binary (${{ matrix.arch }})
        run: |
          bun build cli/src/index.ts \
            --compile \
            --outfile dist/${{ matrix.outfile }} \
            --target ${{ matrix.bun_target }}

      - name: Ad-hoc sign binary (${{ matrix.arch }})
        run: codesign --sign - --force dist/${{ matrix.outfile }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.outfile }}
          path: dist/${{ matrix.outfile }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifacts into dist/
        run: |
          find dist/ -mindepth 2 -type f -exec mv {} dist/ \;
          find dist/ -empty -type d -delete

      - name: Create tarballs
        run: |
          cd dist
          tar -czf agent-notify-darwin-arm64.tar.gz agent-notify-darwin-arm64
          tar -czf agent-notify-darwin-x64.tar.gz agent-notify-darwin-x64
          sha256sum agent-notify-darwin-arm64.tar.gz agent-notify-darwin-x64.tar.gz > checksums.txt
          cat checksums.txt

      - name: Export tarball SHAs
        id: shas
        run: |
          echo "arm64=$(sha256sum dist/agent-notify-darwin-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x64=$(sha256sum dist/agent-notify-darwin-x64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula with version + SHAs
        env:
          VERSION: ${{ github.ref_name }}
          ARM64_SHA: ${{ steps.shas.outputs.arm64 }}
          X64_SHA: ${{ steps.shas.outputs.x64 }}
        run: |
          sed -i \
            -e "s|HOMEBREW_VERSION_PLACEHOLDER|${VERSION#v}|g" \
            -e "s|HOMEBREW_ARM64_SHA_PLACEHOLDER|${ARM64_SHA}|g" \
            -e "s|HOMEBREW_X64_SHA_PLACEHOLDER|${X64_SHA}|g" \
            Formula/agent-notify.rb
          cat Formula/agent-notify.rb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/agent-notify-darwin-arm64.tar.gz
            dist/agent-notify-darwin-x64.tar.gz
            dist/checksums.txt
            Formula/agent-notify.rb
          body: |
            ## Install via Homebrew

            ```sh
            brew tap piqusy/tap
            brew install agent-notify
            ```

            Upgrade:
            ```sh
            brew upgrade agent-notify
            ```

            ## Manual install

            ```sh
            # Apple Silicon (arm64)
            curl -L https://github.com/piqusy/agent-notify/releases/download/${{ github.ref_name }}/agent-notify-darwin-arm64.tar.gz | tar xz
            chmod +x agent-notify-darwin-arm64 && mv agent-notify-darwin-arm64 /usr/local/bin/agent-notify

            # Intel (x64)
            curl -L https://github.com/piqusy/agent-notify/releases/download/${{ github.ref_name }}/agent-notify-darwin-x64.tar.gz | tar xz
            chmod +x agent-notify-darwin-x64 && mv agent-notify-darwin-x64 /usr/local/bin/agent-notify
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download published release tarballs
        # Download the *actual* release assets so SHA256 matches what Homebrew fetches
        run: |
          gh release download ${{ github.ref_name }} \
            -R piqusy/agent-notify \
            -p "agent-notify-darwin-arm64.tar.gz" \
            -p "agent-notify-darwin-x64.tar.gz" \
            --dir dist/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHAs from release tarballs
        id: shas
        run: |
          echo "arm64=$(sha256sum dist/agent-notify-darwin-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x64=$(sha256sum dist/agent-notify-darwin-x64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Patch formula
        env:
          VERSION: ${{ github.ref_name }}
          ARM64_SHA: ${{ steps.shas.outputs.arm64 }}
          X64_SHA: ${{ steps.shas.outputs.x64 }}
        run: |
          sed -i \
            -e "s|HOMEBREW_VERSION_PLACEHOLDER|${VERSION#v}|g" \
            -e "s|HOMEBREW_ARM64_SHA_PLACEHOLDER|${ARM64_SHA}|g" \
            -e "s|HOMEBREW_X64_SHA_PLACEHOLDER|${X64_SHA}|g" \
            Formula/agent-notify.rb

      - name: Configure SSH for tap repo
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host github-tap
            HostName github.com
            User git
            IdentityFile ~/.ssh/tap_deploy_key
          EOF

      - name: Clone tap repo
        run: git clone git@github-tap:piqusy/homebrew-tap.git tap

      - name: Copy patched formula into tap
        run: cp Formula/agent-notify.rb tap/Formula/agent-notify.rb

      - name: Commit and push to tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-notify.rb
          git commit -m "update: agent-notify ${{ github.ref_name }}"
          git push
